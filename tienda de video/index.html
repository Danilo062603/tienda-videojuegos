<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameZone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>🎮 GameZone</h1>
    <p>Gestiona tus partidas y juegos favoritos</p>
</header>

<main>

    <section id="formulario">
        <h2>Registrar Partida</h2>
        <form>
            <label>Nombre del Juego</label>
            <input type="text" placeholder="Ej: FIFA 25" required>

            <label>Jugador</label>
            <input type="text" placeholder="Tu nombre" required>

            <label>Fecha</label>
            <input type="date" required>

            <label>Descripción</label>
            <textarea placeholder="Detalles de la partida..."></textarea>

            <button type="submit">Guardar Partida</button>
        </form>
    </section>

    <section id="citas">
        <h2>Partidas Registradas</h2>
        <ul>
            <li class="cita pendiente">Call of Duty - En progreso</li>
            <li class="cita atendida">Minecraft - Completado</li>
        </ul>
    </section>

    <section id="servicios">
        <h2>Géneros</h2>
        <article>🎯 Acción</article>
        <article>⚽ Deportes</article>
        <article>🧠 Estrategia</article>
    </section>

</main>

<footer>
    <p>GameZone © 2026</p>
</footer>

</body>
</html>
